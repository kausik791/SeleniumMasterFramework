services:
  selenium-hub:
    image: selenium/hub:4.18.1
    container_name: selenium-hub
    stop_grace_period: 5s        # ← Force kill after 5s
    ports:
      - "4444:4444"
      - "4442:4442"
      - "4443:4443"
    networks:
      - selenium-grid

  chrome:
    image: selenium/node-chrome:4.18.1
    shm_size: 2gb
    stop_grace_period: 5s        # ← Force kill after 5s
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    networks:
      - selenium-grid

  firefox:
    image: selenium/node-firefox:4.18.1
    shm_size: 2gb
    stop_grace_period: 5s        # ← Force kill after 5s
    depends_on:
      - selenium-hub
    environment:
      - SE_EVENT_BUS_HOST=selenium-hub
      - SE_EVENT_BUS_PUBLISH_PORT=4442
      - SE_EVENT_BUS_SUBSCRIBE_PORT=4443
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    networks:
      - selenium-grid

networks:
  selenium-grid:
    driver: bridge